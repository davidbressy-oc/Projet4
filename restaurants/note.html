<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ohmyfood</title>

    <link rel="stylesheet" href="../sass/main.css">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Shrikhand&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.2.1/css/all.min.css">
</head>

<body>

    <!-- HEADER -->
    <header>
        <a href="../index.html"><i class="fa-solid fa-arrow-left"></i></a>
        <div class="header__title__content">
            <h1 class="main__title">ohmyfood</h1>
        </div>
    </header>

    <!-- PHOTO -->
    <div class="photo__pages">
        <div class="photo__pages__image photo__pages__image--position">
            <img src="../assets/images/restaurants/note.jpg" alt="La note enchantée">
        </div>
    </div>

    <!-- MENU -->
    <section class="menu">
        <div class="menu__header">
            <h2 class="menu__title">La note enchantée</h2>

            <button class="menu__like">
                <i class="fa-regular fa-heart heart--empty"></i>
                <i class="fa-solid fa-heart heart--full"></i>
            </button>
        </div>

        <section class="menu__group">
            <h3 class="menu__group__title">Entrées</h3>

            <button class="menu__item" type="button">
                <span class="menu__item__content">
                    <span class="menu__item__text">
                        <span class="menu__item__title">Ravioles de foie gras </span>
                        <span class="menu__item__description">Accompagnées de leur crème à la truffe</span>
                    </span>
                    <span class="menu__item__price">25€</span>
                </span>
                <span class="menu__item__check">
                    <i class="fa-solid fa-circle-check"></i>
                </span>
            </button>

            <button class="menu__item" type="button">
                <span class="menu__item__content">
                    <span class="menu__item__text">
                        <span class="menu__item__title">Caviar osciètre </span>
                        <span class="menu__item__description">Sur blini à la farine de blé noir</span>
                    </span>
                    <span class="menu__item__price">35€</span>
                </span>
                <span class="menu__item__check">
                    <i class="fa-solid fa-circle-check"></i>
                </span>
            </button>

            <button class="menu__item" type="button">
                <span class="menu__item__content">
                    <span class="menu__item__text">
                        <span class="menu__item__title">Homard et espuma de potiron</span>
                        <span class="menu__item__description">Marinés aux zestes d'orange</span>
                    </span>
                    <span class="menu__item__price">20€</span>
                </span>
                <span class="menu__item__check">
                    <i class="fa-solid fa-circle-check"></i>
                </span>
            </button>

                        <button class="menu__item" type="button">
                <span class="menu__item__content">
                    <span class="menu__item__text">
                        <span class="menu__item__title">Foie gras de canard cuit entier</span>
                        <span class="menu__item__description">Confiture de figue et pain toasté</span>
                    </span>
                    <span class="menu__item__price">35€</span>
                </span>
                <span class="menu__item__check">
                    <i class="fa-solid fa-circle-check"></i>
                </span>
            </button>

        </section>

        <section class="menu__group">
            <h3 class="menu__group__title">Plats</h3>

            <button class="menu__item" type="button">
                <span class="menu__item__content">
                    <span class="menu__item__text">
                        <span class="menu__item__title">Noix de coquilles Saint-Jacques</span>
                        <span class="menu__item__description">Sur lit de purée de céleri-rave</span>
                    </span>
                    <span class="menu__item__price">40€</span>
                </span>
                <span class="menu__item__check">
                    <i class="fa-solid fa-circle-check"></i>
                </span>
            </button>

            <button class="menu__item" type="button">
                <span class="menu__item__content">
                    <span class="menu__item__text">
                        <span class="menu__item__title">Langoustine poêlée</span>
                        <span class="menu__item__description">Purée de patate douce</span>
                    </span>
                    <span class="menu__item__price">35€</span>
                </span>
                <span class="menu__item__check">
                    <i class="fa-solid fa-circle-check"></i>
                </span>
            </button>

            <button class="menu__item" type="button">
                <span class="menu__item__content">
                    <span class="menu__item__text">
                        <span class="menu__item__title">Mijoté de queue de bœuf </span>
                        <span class="menu__item__description">Et riz sauvage aux zestes de citron</span>
                    </span>
                    <span class="menu__item__price">45€</span>
                </span>
                <span class="menu__item__check">
                    <i class="fa-solid fa-circle-check"></i>
                </span>
            </button>
        </section>

        <section class="menu__group">
            <h3 class="menu__group__title">Desserts</h3>

            <button class="menu__item" type="button">
                <span class="menu__item__content">
                    <span class="menu__item__text">
                        <span class="menu__item__title">Macaron noisette et chocolat</span>
                        <span class="menu__item__description">Glace au caramel brun et sel de Guérande</span>
                    </span>
                    <span class="menu__item__price">18€</span>
                </span>
                <span class="menu__item__check">
                    <i class="fa-solid fa-circle-check"></i>
                </span>
            </button>

            <button class="menu__item" type="button">
                <span class="menu__item__content">
                    <span class="menu__item__text">
                        <span class="menu__item__title">Baba au rhum revisité </span>
                        <span class="menu__item__description">Avec son coulis de citron</span>
                    </span>
                    <span class="menu__item__price">22€</span>
                </span>
                <span class="menu__item__check">
                    <i class="fa-solid fa-circle-check"></i>
                </span>
            </button>

            <button class="menu__item" type="button">
                <span class="menu__item__content">
                    <span class="menu__item__text">
                        <span class="menu__item__title">Tarte au citron meringuée </span>
                        <span class="menu__item__description">Déstructurée</span>
                    </span>
                    <span class="menu__item__price">23€</span>
                </span>
                <span class="menu__item__check">
                    <i class="fa-solid fa-circle-check"></i>
                </span>
            </button>
        </section>
    </section>

    <!-- COMMANDE -->
    <div class="commande">
        <a href="#" class="commande__button">Commander</a>
    </div>

    <!-- FOOTER -->
    <footer class="footer">
        <h2 class="footer__title">ohmyfood</h2>

        <div class="footer__links">
            <a href="#"><i class="fa-solid fa-utensils"></i>Proposer un restaurant</a>
            <a href="#"><i class="fa-solid fa-hands-helping"></i>Devenir partenaire</a>
            <a href="#">Mentions légales</a>
            <a href="#">Contact</a>
        </div>
    </footer>

</body>
</html>
